<!--
  Jekyll Simple Search loader
  See: <https://github.com/christian-fei/Simple-Jekyll-Search>
-->

{% capture result_elem %}
  <article class="px-1 px-sm-2 px-lg-4 px-xl-0">
    <header>
      <h2><a href="{url}">{title}</a></h2>
      <div class="post-meta d-flex flex-column flex-sm-row text-muted mt-1 mb-1">
        {categories}
        {tags}
      </div>
    </header>
    <p>{content}</p>
  </article>
{% endcapture %}

{% capture not_found %}<p class="mt-5">{{ site.data.locales[include.lang].search.no_results }}</p>{% endcapture %}

<script>
  // IMPROVEMENT 1: Helper function to safely escape regex characters 
  // (Prevents site breaking if someone searches for "C++" or "array[0]")
  function escapeRegExp(string) {
    return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  document.addEventListener('DOMContentLoaded', () => {
    SimpleJekyllSearch({
      searchInput: document.getElementById('search-input'),
      resultsContainer: document.getElementById('search-results'),
      json: '{{ '/assets/js/data/search.json' | relative_url }}',
      searchResultTemplate: '{{ result_elem | strip_newlines }}',
      noResultsText: '{{ not_found }}',
      templateMiddleware: function(prop, value, template) {
        
        if (prop === 'categories') {
          if (value === '') {
            return `${value}`;
          } else {
            return `<div class="me-sm-4"><i class="far fa-folder fa-fw"></i>${value}</div>`;
          }
        }

        if (prop === 'tags') {
          if (value === '') {
            return `${value}`;
          } else {
            return `<div><i class="fa fa-tag fa-fw"></i>${value}</div>`;
          }
        }

        if (prop === 'content') {
          const rawSearchTerm = document.getElementById('search-input').value.trim();
          
          if (rawSearchTerm && value) {
            const safeSearchTerm = escapeRegExp(rawSearchTerm);
            
            // IMPROVEMENT 2: Split terms by space to highlight multiple words
            const terms = safeSearchTerm.split(/\s+/).join('|');
            const regex = new RegExp(`(${terms})`, 'gi');
            const match = regex.exec(value);
            
            if (match) {
              const padding = 60;
              let start = Math.max(0, match.index - padding);
              let end = Math.min(value.length, match.index + match[0].length + padding);
              
              // IMPROVEMENT 3: Snap to nearest space to avoid cutting words in half
              if (start > 0) start = value.indexOf(' ', start) + 1 || start;
              if (end < value.length) end = value.lastIndexOf(' ', end) || end;
              
              let snippet = value.substring(start, end);
              
              if (start > 0) snippet = '...' + snippet;
              if (end < value.length) snippet = snippet + '...';
              
              // $1 refers to the matched group in our regex
              return snippet.replace(regex, '<mark class="bg-warning text-dark">$1</mark>');
            }
          }
          
          // Fallback
          return value.length > 120 ? value.substring(0, 120) + '...' : value;
        }

        if (prop === 'url') {
          const searchTerm = document.getElementById('search-input').value.trim();
          if (searchTerm) {
            return `${value}#:~:text=${encodeURIComponent(searchTerm)}`;
          }
          return value;
        }
        
      }
    });
  });
</script>
