<!--
  Jekyll Simple Search loader
  See: <https://github.com/christian-fei/Simple-Jekyll-Search>
-->

{% capture result_elem %}
  <article class="px-1 px-sm-2 px-lg-4 px-xl-0">
    <header>
      <h2><a href="{url}">{title}</a></h2>
      <div class="post-meta d-flex flex-column flex-sm-row text-muted mt-1 mb-1">
        {categories}
        {tags}
      </div>
    </header>
    <p>{content}</p>
  </article>
{% endcapture %}

{% capture not_found %}<p class="mt-5">{{ site.data.locales[include.lang].search.no_results }}</p>{% endcapture %}

<script>
  {% comment %} Note: dependent library will be loaded in `js-selector.html` {% endcomment %}
  document.addEventListener('DOMContentLoaded', () => {
    SimpleJekyllSearch({
      searchInput: document.getElementById('search-input'),
      resultsContainer: document.getElementById('search-results'),
      json: '{{ '/assets/js/data/search.json' | relative_url }}',
      searchResultTemplate: '{{ result_elem | strip_newlines }}',
      noResultsText: '{{ not_found }}',
      templateMiddleware: function(prop, value, template) {
        
        if (prop === 'categories') {
          if (value === '') {
            return `${value}`;
          } else {
            return `<div class="me-sm-4"><i class="far fa-folder fa-fw"></i>${value}</div>`;
          }
        }

        if (prop === 'tags') {
          if (value === '') {
            return `${value}`;
          } else {
            return `<div><i class="fa fa-tag fa-fw"></i>${value}</div>`;
          }
        }

        // NEW: Extract matched snippet and highlight the text
        if (prop === 'content') {
          const searchTerm = document.getElementById('search-input').value.trim();
          
          if (searchTerm && value) {
            // Create a case-insensitive regex for the search term
            const regex = new RegExp(searchTerm, 'gi');
            const match = regex.exec(value);
            
            if (match) {
              const padding = 60; // Number of characters to show before and after the match
              const start = Math.max(0, match.index - padding);
              const end = Math.min(value.length, match.index + searchTerm.length + padding);
              
              let snippet = value.substring(start, end);
              
              // Add ellipses if the text was cut off
              if (start > 0) snippet = '...' + snippet;
              if (end < value.length) snippet = snippet + '...';
              
              // Highlight the matched word using HTML <mark> tag
              // $& inserts the matched substring, preserving its original capitalization
              return snippet.replace(regex, '<mark class="bg-warning text-dark">$&</mark>');
            }
          }
          
          // Fallback: If the search term matched the title/tags but isn't in the content, 
          // just show the first 120 characters of the post.
          return value.length > 120 ? value.substring(0, 120) + '...' : value;
        }

        // Append the search text fragment to the URL
        if (prop === 'url') {
          const searchTerm = document.getElementById('search-input').value.trim();
          if (searchTerm) {
            return `${value}#:~:text=${encodeURIComponent(searchTerm)}`;
          }
          return value;
        }
        
      }
    });
  });
</script>
