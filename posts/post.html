<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>First Year Suggestion - OhmLaws</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col min-h-screen">

  <div class="md:flex flex-1 items-stretch">

    <!-- Sidebar -->
    <div id="sidebar-container" class="md:sticky md:top-0 md:h-screen"></div>
    <!-- Mobile Sidebar Overlay -->
    <div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-40 lg:hidden"></div>

    <div class="flex-1 flex flex-col md:flex-row items-stretch">
      <div class="flex-1 flex flex-col px-4 py-6 space-y-6 md:space-y-8 md:max-w-2xl md:mx-auto md:py-10 lg:max-w-2xl md:overflow-y-auto md:h-screen">
        
        <!-- Header -->
        <div id="header-container" class="bg-gray-900 md:bg-transparent"></div>
        <div id="mobileSearchOverlay-container"></div>
        
        <!-- POST BODY (content only, no share or footer portions here) -->
        <div id="postbody-container"></div>
        
        <!-- Share & Back-to-Top Container = always at bottom of post -->
        <div id="post-actions-container"></div>
        
        <!-- Pagination at the very end -->
        <div id="pagination-container"></div>
      </div>
      <div id="rightsidebar-container" class="hidden lg:block md:sticky md:top-0 md:h-screen"></div>
    </div>
  </div>
  <div id="footer-container"></div>

  <!-- JS files -->
  <script src="/js/loadComponents.js"></script>
  <script src="/js/shareLinks.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/themeToggle.js"></script>
  <script src="/js/search.js"></script>
</body>
</html>
